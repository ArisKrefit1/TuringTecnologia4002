# ─────────────────────────────────────────────────────────────
# Configuração do banco PostgreSQL no Supabase
#
# Substitua os valores abaixo com os dados do seu projeto
# no Supabase em: Settings > Database > Connection string
# ─────────────────────────────────────────────────────────────

# Formato da URL:
# jdbc:postgresql://db.SEUPROJETO.supabase.co:5432/postgres
spring.datasource.url=jdbc:postgresql://db.SEUPROJETO.supabase.co:5432/postgres

spring.datasource.username=postgres
spring.datasource.password=SUA_SENHA_AQUI

spring.datasource.driver-class-name=org.postgresql.Driver

# Cria as tabelas automaticamente ao subir
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080
spring.application.name=api-evento
